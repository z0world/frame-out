<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%232563eb'/><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='-apple-system,Helvetica Neue,sans-serif' font-weight='800' font-size='20' fill='white'>i</text></svg>">
<title>iFrame</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#ffffff;
  --card:#ffffff;
  --text:#111827;
  --muted:#9ca3af;
  --border:#e5e7eb;
  --accent:#2563eb;
  --accent-light:#eff6ff;
  --sf:'SF Pro Display',-apple-system,'Helvetica Neue',sans-serif;
}
body { background:var(--bg); font-family:var(--sf); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:48px 20px 80px; }

/* HEADER */
.header { text-align:center; margin-bottom:32px; }
.logo { font-size:32px; font-weight:800; letter-spacing:-0.5px; color:var(--text); margin-bottom:4px; }
.logo span { color:var(--accent); }
.tagline { font-size:13px; color:var(--muted); font-weight:400; }

/* TABS */
.tabs { display:flex; width:100%; max-width:460px; background:var(--border); border-radius:12px; padding:3px; margin-bottom:20px; gap:3px; }
.tab { flex:1; padding:9px 8px; border-radius:9px; border:none; background:transparent; font-family:var(--sf); font-size:13px; font-weight:500; color:var(--muted); cursor:pointer; transition:all 0.18s; }
.tab.on { background:var(--card); color:var(--accent); font-weight:600; }

/* UPLOAD */
.upload { width:100%; max-width:460px; background:#f5f5f5; border:1.5px dashed #d1d5db; border-radius:16px; padding:44px 24px; text-align:center; cursor:pointer; position:relative; transition:all 0.2s; }
.upload:hover,.upload.over { border-color:var(--accent); background:#eff6ff; }
.upload input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }

.upload-title { font-size:15px; font-weight:600; margin-bottom:4px; color:var(--text); }
.upload-sub { font-size:12px; color:var(--muted); }
.upload-icon-wrap { margin-bottom:12px; display:flex; justify-content:center; }
.upload-link { color:var(--accent); font-weight:600; }

/* CROP */
.crop-step { display:none; flex-direction:column; align-items:center; gap:14px; width:100%; max-width:520px; }
.crop-step.show { display:flex; }
.step-lbl { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:0.07em; text-transform:uppercase; align-self:flex-start; }
.crop-wrap { position:relative; width:100%; background:#111; border-radius:12px; overflow:hidden; user-select:none; touch-action:none; }
#cropImg { display:block; width:100%; height:auto; max-height:480px; object-fit:contain; opacity:0.4; pointer-events:none; }
#cropBox { position:absolute; border:2px solid #fff; box-shadow:0 0 0 9999px rgba(0,0,0,0.52); cursor:move; touch-action:none; }
#cropBox::before,#cropBox::after,.cb-bl,.cb-br { content:''; position:absolute; width:16px; height:16px; border-color:#fff; border-style:solid; }
#cropBox::before{top:-2px;left:-2px;border-width:2.5px 0 0 2.5px}
#cropBox::after {top:-2px;right:-2px;border-width:2.5px 2.5px 0 0}
.cb-bl{bottom:-2px;left:-2px;border-width:0 0 2.5px 2.5px}
.cb-br{bottom:-2px;right:-2px;border-width:0 2.5px 2.5px 0}
.grid { position:absolute; inset:0; pointer-events:none; background-image:linear-gradient(rgba(255,255,255,0.15) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.15) 1px,transparent 1px); background-size:33.33% 33.33%; }
.rh{position:absolute;width:22px;height:22px;background:transparent;z-index:5}
.rh-tl{top:-4px;left:-4px;cursor:nwse-resize}.rh-tr{top:-4px;right:-4px;cursor:nesw-resize}
.rh-bl{bottom:-4px;left:-4px;cursor:nesw-resize}.rh-br{bottom:-4px;right:-4px;cursor:nwse-resize}
.rh-t{top:-4px;left:20%;width:60%;cursor:n-resize}.rh-b{bottom:-4px;left:20%;width:60%;cursor:s-resize}
.rh-l{left:-4px;top:20%;height:60%;cursor:w-resize}.rh-r{right:-4px;top:20%;height:60%;cursor:e-resize}

.ratio-row { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; width:100%; }
.rbtn { padding:6px 14px; border-radius:8px; border:1.5px solid var(--border); background:var(--card); font-family:var(--sf); font-size:12px; font-weight:500; color:var(--muted); cursor:pointer; transition:all 0.15s; }
.rbtn.on { background:var(--accent-light); border-color:var(--accent); color:var(--accent); font-weight:600; }
.btn-apply { background:var(--accent); color:#fff; border:none; border-radius:10px; padding:13px; font-size:15px; font-weight:600; font-family:var(--sf); cursor:pointer; width:100%; transition:opacity 0.15s; }
.btn-apply:hover { opacity:.88; }

/* PREVIEW */
.preview-step { display:none; flex-direction:column; align-items:center; gap:16px; width:100%; }
.preview-step.show { display:flex; }

.preview-card { width:100%; max-width:460px; background:var(--card); border-radius:16px; padding:16px; border:1px solid var(--border); }
.card-lbl { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:0.07em; text-transform:uppercase; margin-bottom:10px; }
.checker { border-radius:10px; overflow:hidden; background-image:linear-gradient(45deg,#e5e7eb 25%,#f3f4f6 25%),linear-gradient(-45deg,#e5e7eb 25%,#f3f4f6 25%),linear-gradient(45deg,#f3f4f6 75%,#e5e7eb 75%),linear-gradient(-45deg,#f3f4f6 75%,#e5e7eb 75%); background-size:14px 14px; background-position:0 0,0 7px,7px -7px,-7px 0; }
#liveCanvas { display:block; width:100%; height:auto; }

.save-card { background:var(--card); border-radius:16px; padding:16px; width:100%; max-width:460px; border:1px solid var(--border); display:flex; flex-direction:column; gap:18px; }
.sec-lbl { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:0.07em; text-transform:uppercase; margin-bottom:8px; }
.pill-row { display:flex; gap:6px; flex-wrap:wrap; }
.pill { padding:6px 14px; border-radius:8px; border:1.5px solid var(--border); background:var(--card); font-family:var(--sf); font-size:12px; font-weight:500; color:var(--muted); cursor:pointer; transition:all 0.15s; }
.pill.on { background:var(--accent-light); border-color:var(--accent); color:var(--accent); font-weight:600; }

.bg-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.sw { width:28px; height:28px; border-radius:8px; cursor:pointer; border:1.5px solid var(--border); transition:all 0.15s; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.sw.on { border-color:var(--accent); outline:2px solid var(--accent); outline-offset:1px; }
.sw-trans { background:var(--card); font-size:9px; font-weight:700; color:var(--muted); width:40px; border-radius:8px; font-family:var(--sf); }
.sw-custom { position:relative; width:28px; height:28px; }
.sw-custom input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.sw-custom-face { width:28px; height:28px; border-radius:8px; border:1.5px solid var(--border); background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red); pointer-events:none; }

.btn-save { background:var(--accent); color:#fff; border:none; border-radius:10px; padding:13px; font-size:15px; font-weight:600; font-family:var(--sf); cursor:pointer; width:100%; transition:opacity 0.15s; }
.btn-save:hover { opacity:.88; }
#reInput { display:none; }
.btn-re { background:transparent; border:1.5px solid var(--border); color:var(--text); font-size:14px; font-weight:500; font-family:var(--sf); cursor:pointer; padding:10px 0; text-align:center; width:100%; border-radius:10px; transition:all 0.15s; }
.btn-re:hover { border-color:var(--accent); color:var(--accent); }
.footer { margin-top:32px; font-size:11px; color:var(--muted); text-align:center; line-height:1.6; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">i<span>Frame</span></div>
  <div class="tagline">사진을 iOS UI 프레임 안에 넣어주는 효과</div>
</div>

<div class="tabs">
  <button class="tab on" id="tabAirdrop" onclick="setEffect('airdrop')">📡 AirDrop</button>
  <button class="tab"    id="tabMusic"   onclick="setEffect('music')">🎵 Music Player</button>
</div>

<!-- Step 1: Upload -->
<div class="upload" id="uploadZone">
  <input type="file" id="fileInput" accept="image/*">
  <div class="upload-icon-wrap">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- cloud outline -->
      <path d="M34 30C37.3137 30 40 27.3137 40 24C40 20.9323 37.7648 18.3968 34.8169 17.8999C34.2383 13.9869 30.8831 11 26.8 11C24.4955 11 22.4167 11.9528 20.9278 13.4888C20.298 13.178 19.5895 13 18.84 13C16.1612 13 14 15.1612 14 17.84C14 18.0524 14.0143 18.2617 14.0421 18.4668C11.6907 19.4077 10 21.7072 10 24.4C10 27.9898 12.9101 30.9 16.5 30.9" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- arrow up -->
      <line x1="24" y1="38" x2="24" y2="24" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"/>
      <polyline points="18,30 24,24 30,30" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="upload-title">드래그하거나 <span class="upload-link">파일을 선택</span>해서 업로드</div>
  <div class="upload-sub">JPG · PNG · WEBP</div>
</div>

<!-- Step 2: Crop -->
<div class="crop-step" id="cropStep">
  <div class="step-lbl">크롭 영역 설정</div>
  <div class="crop-wrap" id="cropWrap">
    <img id="cropImg" src="" alt="">
    <div id="cropBox">
      <div class="grid"></div>
      <div class="cb-bl"></div><div class="cb-br"></div>
      <div class="rh rh-tl" data-d="tl"></div><div class="rh rh-tr" data-d="tr"></div>
      <div class="rh rh-bl" data-d="bl"></div><div class="rh rh-br" data-d="br"></div>
      <div class="rh rh-t" data-d="t"></div><div class="rh rh-b" data-d="b"></div>
      <div class="rh rh-l" data-d="l"></div><div class="rh rh-r" data-d="r"></div>
    </div>
  </div>
  <div class="ratio-row">
    <button class="rbtn on" onclick="setCR(this,'free')">자유</button>
    <button class="rbtn" onclick="setCR(this,'1:1')">1:1</button>
    <button class="rbtn" onclick="setCR(this,'4:3')">4:3</button>
    <button class="rbtn" onclick="setCR(this,'3:4')">3:4</button>
    <button class="rbtn" onclick="setCR(this,'16:9')">16:9</button>
    <button class="rbtn" onclick="setCR(this,'9:16')">9:16</button>
  </div>
  <button class="btn-apply" onclick="applyCrop()">이 영역으로 적용 →</button>
</div>

<!-- Step 3: Preview -->
<div class="preview-step" id="previewStep">
  <div class="preview-card">
    <div class="card-lbl">Preview</div>
    <div class="checker"><canvas id="liveCanvas"></canvas></div>
  </div>
  <div class="save-card">
    <div>
      <div class="sec-lbl">저장 캔버스 비율</div>
      <div class="pill-row">
        <button class="pill on"  onclick="setSR(this,'1:1')">1 : 1</button>
        <button class="pill" onclick="setSR(this,'4:3')">4 : 3</button>
        <button class="pill" onclick="setSR(this,'3:4')">3 : 4</button>
        <button class="pill" onclick="setSR(this,'16:9')">16 : 9</button>
        <button class="pill" onclick="setSR(this,'9:16')">9 : 16</button>
      </div>
    </div>
    <div>
      <div class="sec-lbl">프레임 배경</div>
      <div class="bg-row">
        <div class="sw sw-trans on" onclick="setBG(this,'transparent')">투명</div>
        <div class="sw on2" style="background:#fff;border:1px solid #ddd;" onclick="setBG(this,'#ffffff')"></div>
        <div class="sw" style="background:#000;" onclick="setBG(this,'#000000')"></div>
        <div class="sw" style="background:#f2f2f7;border:1px solid #ddd;" onclick="setBG(this,'#f2f2f7')"></div>
        <div class="sw-custom">
          <div class="sw-custom-face"></div>
          <input type="color" value="#ff6b6b" oninput="setCustomBG(this.value)">
        </div>
      </div>
    </div>
    <button class="btn-save" onclick="doDownload()">이미지 저장</button>
    <input type="file" id="reInput" accept="image/*">
    <button class="btn-re" onclick="document.getElementById('reInput').click()">다시 업로드</button>
  </div>
</div>

<div class="footer">© 2025 iFrame</div>

<script>
// ── globals ──────────────────────────────────────
var effect    = 'airdrop';
var saveRatio = '1:1';
var bgColor   = 'transparent';
var cropRatio = 'free';
var srcImg    = null;   // original Image
var cropped   = null;   // HTMLCanvasElement — the cropped photo
var drag      = null;
var box       = {x:0,y:0,w:0,h:0};
var RATIOS    = {'1:1':[1,1],'4:3':[4,3],'3:4':[3,4],'16:9':[16,9],'9:16':[9,16]};

// ── SVG icons ────────────────────────────────────
var SVG = {
  prev:    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect x="4" y="4" width="2.5" height="16" rx="1.2" fill="white"/><path d="M20 5L9 12L20 19Z" fill="white"/></svg>',
  next:    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect x="17.5" y="4" width="2.5" height="16" rx="1.2" fill="white"/><path d="M4 5L15 12L4 19Z" fill="white"/></svg>',
  pause:   '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect x="5" y="4" width="5" height="16" rx="2" fill="white"/><rect x="14" y="4" width="5" height="16" rx="2" fill="white"/></svg>',
  volLo:   '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3z" fill="rgba(255,255,255,0.6)"/><path d="M16.5 12c0-1.8-1-3.3-2.5-4.1v8.2c1.5-.8 2.5-2.3 2.5-4.1z" fill="rgba(255,255,255,0.6)"/></svg>',
  volHi:   '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3z" fill="rgba(255,255,255,0.6)"/><path d="M16.5 12c0-1.8-1-3.3-2.5-4.1v8.2c1.5-.8 2.5-2.3 2.5-4.1z" fill="rgba(255,255,255,0.6)"/><path d="M18.5 8.5 Q21 10 21 12 Q21 14 18.5 15.5" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M20 5.5 Q24 8.5 24 12 Q24 15.5 20 18.5" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  airplay: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h18a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-2" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/><path d="M12 15L17 22H7L12 15Z" fill="rgba(255,255,255,0.6)"/></svg>'
};

function svgToImg(svgStr) {
  return new Promise(function(resolve) {
    var img = new Image();
    var blob = new Blob([svgStr], {type:'image/svg+xml'});
    var url = URL.createObjectURL(blob);
    img.onload = function() { URL.revokeObjectURL(url); resolve(img); };
    img.src = url;
  });
}

// ── tab & option handlers ─────────────────────────
function setEffect(e) {
  effect = e;
  document.getElementById('tabAirdrop').classList.toggle('on', e==='airdrop');
  document.getElementById('tabMusic').classList.toggle('on',   e==='music');
  renderLive();
}
function setSR(btn, r) {
  saveRatio = r;
  document.querySelectorAll('.pill').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  renderLive();
}
function setBG(el, c) {
  bgColor = c;
  document.querySelectorAll('.sw').forEach(function(b){ b.classList.remove('on'); });
  el.classList.add('on');
  renderLive();
}
function setCustomBG(c) {
  bgColor = c;
  document.querySelectorAll('.sw').forEach(function(b){ b.classList.remove('on'); });
  renderLive();
}

// ── upload ───────────────────────────────────────
function setupUpload(id) {
  document.getElementById(id).addEventListener('change', function(e) {
    if (e.target.files && e.target.files[0]) loadFile(e.target.files[0]);
  });
}
setupUpload('fileInput');
setupUpload('reInput');

var uz = document.getElementById('uploadZone');
uz.addEventListener('dragover', function(e){ e.preventDefault(); uz.classList.add('over'); });
uz.addEventListener('dragleave', function(){ uz.classList.remove('over'); });
uz.addEventListener('drop', function(e){
  e.preventDefault(); uz.classList.remove('over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

function loadFile(file) {
  var reader = new FileReader();
  reader.onload = function(ev) {
    var img = new Image();
    img.onload = function() {
      srcImg = img;
      startCrop(img, ev.target.result);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ── crop ─────────────────────────────────────────
function startCrop(img, dataUrl) {
  uz.style.display = 'none';
  document.getElementById('cropStep').classList.add('show');
  document.getElementById('previewStep').classList.remove('show');

  var ci = document.getElementById('cropImg');
  ci.onload = function() {
    // img width=100%, height=auto → rendered size matches img element
    var cw = ci.offsetWidth;
    var ch = ci.offsetHeight;
    // initial box: 85% of rendered image, centered
    var bw = cw * 0.85;
    var bh = ch * 0.85;
    box = { x: (cw - bw) / 2, y: (ch - bh) / 2, w: bw, h: bh };
    drawBox();
  };
  ci.src = dataUrl;
}

function setCR(btn, r) {
  cropRatio = r;
  document.querySelectorAll('.rbtn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  if (r !== 'free') enforceCropAR();
}

function enforceCropAR() {
  if (cropRatio === 'free') return;
  var ar = RATIOS[cropRatio][0] / RATIOS[cropRatio][1];
  var ch = document.getElementById('cropWrap').offsetHeight;
  box.h = box.w / ar;
  if (box.h > ch) { box.h = ch; box.w = box.h * ar; }
  clampBox(); drawBox();
}

function drawBox() {
  var cb = document.getElementById('cropBox');
  cb.style.left = box.x+'px'; cb.style.top = box.y+'px';
  cb.style.width = box.w+'px'; cb.style.height = box.h+'px';
}

function clampBox() {
  var wrap = document.getElementById('cropWrap');
  var cw = wrap.offsetWidth, ch = wrap.offsetHeight;
  var ar = (cropRatio !== 'free') ? RATIOS[cropRatio][0]/RATIOS[cropRatio][1] : null;
  box.w = Math.max(40, Math.min(box.w, cw));
  box.h = Math.max(40, Math.min(box.h, ch));
  if (ar) {
    if (box.w/box.h > ar) box.w = box.h * ar;
    else box.h = box.w / ar;
  }
  box.x = Math.max(0, Math.min(box.x, cw - box.w));
  box.y = Math.max(0, Math.min(box.y, ch - box.h));
}

// drag/resize
var cbEl = document.getElementById('cropBox');
cbEl.addEventListener('mousedown', startDrag);
cbEl.addEventListener('touchstart', startDrag, {passive:false});

function gPos(e) { var t = e.touches ? e.touches[0] : e; return {x:t.clientX, y:t.clientY}; }

function startDrag(e) {
  e.stopPropagation(); e.preventDefault();
  var p = gPos(e);
  drag = { d: e.target.dataset.d || 'move', sx:p.x, sy:p.y, ob:{...box} };
  function up() {
    drag = null;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', up);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', up);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', up);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('touchend', up);
}

function onMove(e) {
  if (!drag) return; e.preventDefault();
  var p = gPos(e), dx = p.x-drag.sx, dy = p.y-drag.sy, ob = drag.ob;
  var ar = (cropRatio !== 'free') ? RATIOS[cropRatio][0]/RATIOS[cropRatio][1] : null;
  var fH = function(w){ return ar ? w/ar : box.h; };
  var fW = function(h){ return ar ? h*ar : box.w; };
  switch(drag.d) {
    case 'move': box.x=ob.x+dx; box.y=ob.y+dy; break;
    case 'tl': { var nw=Math.max(40,ob.w-dx); box.w=nw; box.h=ar?nw/ar:Math.max(40,ob.h-dy); box.x=ob.x+ob.w-box.w; box.y=ob.y+ob.h-box.h; break; }
    case 'tr': { var nw=Math.max(40,ob.w+dx); box.w=nw; box.h=ar?nw/ar:Math.max(40,ob.h-dy); box.y=ob.y+ob.h-box.h; break; }
    case 'bl': { var nw=Math.max(40,ob.w-dx); box.w=nw; box.h=ar?nw/ar:Math.max(40,ob.h+dy); box.x=ob.x+ob.w-box.w; break; }
    case 'br': { var nw=Math.max(40,ob.w+dx); box.w=nw; box.h=ar?nw/ar:Math.max(40,ob.h+dy); break; }
    case 't':  { var nh=Math.max(40,ob.h-dy); box.h=nh; box.w=fW(nh); box.y=ob.y+ob.h-nh; break; }
    case 'b':  { var nh=Math.max(40,ob.h+dy); box.h=nh; box.w=fW(nh); break; }
    case 'l':  { var nw=Math.max(40,ob.w-dx); box.w=nw; box.h=fH(nw); box.x=ob.x+ob.w-nw; break; }
    case 'r':  { var nw=Math.max(40,ob.w+dx); box.w=nw; box.h=fH(nw); break; }
  }
  clampBox(); drawBox();
}

function applyCrop() {
  if (!srcImg) return;
  var ci = document.getElementById('cropImg');
  var cw = ci.offsetWidth;
  var ch = ci.offsetHeight;
  // actual rendered size (object-fit:contain letterbox)
  var imgAR = srcImg.naturalWidth / srcImg.naturalHeight;
  var contAR = cw / ch;
  var dispW, dispH, offX, offY;
  if (imgAR > contAR) { dispW = cw; dispH = cw / imgAR; offX = 0; offY = (ch - dispH) / 2; }
  else                 { dispH = ch; dispW = ch * imgAR; offY = 0; offX = (cw - dispW) / 2; }
  // scale from display px → natural px
  var scX = srcImg.naturalWidth  / dispW;
  var scY = srcImg.naturalHeight / dispH;
  // box coords are relative to container; subtract letterbox offset
  var sx = Math.round((box.x - offX) * scX);
  var sy = Math.round((box.y - offY) * scY);
  var sw = Math.round(box.w * scX);
  var sh = Math.round(box.h * scY);
  // clamp
  sx = Math.max(0, Math.min(sx, srcImg.naturalWidth  - 1));
  sy = Math.max(0, Math.min(sy, srcImg.naturalHeight - 1));
  sw = Math.min(sw, srcImg.naturalWidth  - sx);
  sh = Math.min(sh, srcImg.naturalHeight - sy);
  cropped = document.createElement('canvas');
  cropped.width = sw; cropped.height = sh;
  cropped.getContext('2d').drawImage(srcImg, sx, sy, sw, sh, 0, 0, sw, sh);
  document.getElementById('cropStep').classList.remove('show');
  document.getElementById('previewStep').classList.add('show');
  renderLive();
}

// ── render ───────────────────────────────────────
function renderLive() {
  if (!cropped) return;
  buildFrame().then(function(out) {
    var lc = document.getElementById('liveCanvas');
    var maxW = lc.parentElement.clientWidth;
    lc.width = out.width; lc.height = out.height;
    lc.style.width = maxW+'px';
    lc.style.height = Math.round(out.height * (maxW/out.width))+'px';
    lc.getContext('2d').drawImage(out, 0, 0);
  });
}

function buildFrame() {
  if (effect === 'airdrop') return Promise.resolve(makeAirdrop(cropped));
  else return makeMusic(cropped);
}

// Wrap frame in output canvas with save ratio + bg
function wrapOutput(frame) {
  var fw = frame.width, fh = frame.height;
  var cw = fw, ch = fh;
  if (saveRatio !== 'free') {
    var ar = RATIOS[saveRatio][0] / RATIOS[saveRatio][1];
    if (fw/fh > ar) ch = Math.round(fw/ar);
    else            cw = Math.round(fh*ar);
  }
  var out = document.createElement('canvas');
  out.width = cw; out.height = ch;
  var ctx = out.getContext('2d');
  if (bgColor !== 'transparent') { ctx.fillStyle = bgColor; ctx.fillRect(0,0,cw,ch); }
  ctx.drawImage(frame, Math.round((cw-fw)/2), Math.round((ch-fh)/2));
  return out;
}

// ── AIRDROP ──────────────────────────────────────
function makeAirdrop(src) {
  var PW = Math.min(src.width, 1200);
  var sc = PW / src.width, PH = Math.round(src.height * sc);
  var u = PW / 270;
  var TH = Math.round(58*u), AH = Math.round(56*u), R = Math.round(14*u);
  var popH = TH + PH + AH;

  // draw popup
  var pop = document.createElement('canvas');
  pop.width = PW; pop.height = popH;
  var ctx = pop.getContext('2d');

  // white header
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, PW, TH);
  ctx.fillStyle = '#1c1c1e';
  ctx.font = '700 '+Math.round(17*u)+'px -apple-system,Helvetica Neue,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('AirDrop', PW/2, TH/2);
  // sep
  ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0,TH); ctx.lineTo(PW,TH); ctx.stroke();

  // photo
  ctx.fillStyle = '#e5e5ea';
  ctx.fillRect(0, TH, PW, PH);
  ctx.drawImage(src, 0, 0, src.width, src.height, 0, TH, PW, PH);

  // action bar
  ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0,TH+PH); ctx.lineTo(PW,TH+PH); ctx.stroke();
  ctx.fillStyle = '#f2f2f7';
  ctx.fillRect(0, TH+PH, PW, AH);
  ctx.fillStyle = '#007aff';
  ctx.font = '400 '+Math.round(17*u)+'px -apple-system,Helvetica Neue,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Decline', PW*0.25, TH+PH+AH/2);
  ctx.fillText('Accept',  PW*0.75, TH+PH+AH/2);
  ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PW/2,TH+PH); ctx.lineTo(PW/2,popH); ctx.stroke();

  // round-clip
  var cl = roundClip(pop, R);
  return wrapOutput(addShadow(cl, Math.round(6*u), Math.round(22*u), 0.18));
}

// ── MUSIC PLAYER ─────────────────────────────────
function makeMusic(src) {
  var BW = Math.min(src.width, 1200);
  var u = BW / 300;
  var BR = Math.round(22*u), FM = Math.round(14*u), FR = Math.round(10*u);
  var FW = BW - FM*2;
  var FH = Math.round(src.height * (FW/src.width));

  // control heights — all explicit, sum = CTRL_TOTAL
  var ROW_DEV  = Math.round(32*u);
  var ROW_PROG = Math.round(38*u);
  var ROW_CTRL = Math.round(56*u);
  var ROW_VOL  = Math.round(40*u);
  var PAD_BOT  = Math.round(14*u);
  var CTRL_TOTAL = ROW_DEV + ROW_PROG + ROW_CTRL + ROW_VOL + PAD_BOT;
  var BH = FM + FH + Math.round(FM*0.6) + CTRL_TOTAL;

  // dominant color
  var tmp = document.createElement('canvas'); tmp.width=60; tmp.height=60;
  var tc = tmp.getContext('2d');
  tc.drawImage(src, 0, 0, src.width, src.height, 0, 0, 60, 60);
  var d = tc.getImageData(0,0,60,60).data;
  var rr=0,gg=0,bb=0,n=0;
  for(var i=0;i<d.length;i+=12){rr+=d[i];gg+=d[i+1];bb+=d[i+2];n++;}
  var bodyCol = 'rgb('+Math.round(rr/n*0.42)+','+Math.round(gg/n*0.42)+','+Math.round(bb/n*0.42)+')';

  // load all SVG icons first, then draw
  return Promise.all([
    svgToImg(SVG.prev), svgToImg(SVG.pause), svgToImg(SVG.next),
    svgToImg(SVG.volLo), svgToImg(SVG.volHi), svgToImg(SVG.airplay)
  ]).then(function(imgs) {
    var icoP=imgs[0], icoPa=imgs[1], icoN=imgs[2], icoVL=imgs[3], icoVH=imgs[4], icoAP=imgs[5];

    var c = document.createElement('canvas'); c.width=BW; c.height=BH;
    var ctx = c.getContext('2d');

    // body
    ctx.fillStyle = bodyCol;
    rrPath(ctx,0,0,BW,BH,BR); ctx.fill();

    // white photo frame bg
    ctx.fillStyle = '#ffffff';
    rrPath(ctx,FM,FM,FW,FH,FR); ctx.fill();

    // photo
    ctx.save(); rrPath(ctx,FM,FM,FW,FH,FR); ctx.clip();
    ctx.drawImage(src,0,0,src.width,src.height,FM,FM,FW,FH);
    ctx.restore();

    // controls
    var bx = FM, bw = BW-FM*2;
    var y = FM + FH + Math.round(FM*0.4);

    // device row
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.font = '400 '+Math.round(11*u)+'px -apple-system,sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText('Music Player', bx, y+ROW_DEV*0.5);
    // airplay icon
    var apSz = Math.round(18*u);
    ctx.drawImage(icoAP, BW-FM-apSz, y+ROW_DEV*0.5-apSz/2, apSz, apSz);
    y += ROW_DEV;

    // progress bar
    var th = Math.round(2.5*u);
    var barY = y + ROW_PROG*0.35;
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.roundRect(bx,barY,bw,th,th/2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath(); ctx.roundRect(bx,barY,bw*0.6,th,th/2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(bx+bw*0.6, barY+th/2, Math.round(5*u), 0, Math.PI*2); ctx.fill();
    // time labels
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '400 '+Math.round(10*u)+'px -apple-system,sans-serif';
    ctx.textAlign='left';  ctx.fillText('1:53',  bx,   y+ROW_PROG*0.72);
    ctx.textAlign='right'; ctx.fillText('−1:20', bx+bw,y+ROW_PROG*0.72);
    y += ROW_PROG;

    // control buttons
    var cx = BW/2, cy = y+ROW_CTRL*0.5;
    var szMid = Math.round(32*u), szSide = Math.round(26*u), gap = Math.round(72*u);
    ctx.drawImage(icoP,  cx-gap-szSide/2, cy-szSide/2, szSide, szSide);
    ctx.drawImage(icoPa, cx-szMid/2,      cy-szMid/2,  szMid,  szMid);
    ctx.drawImage(icoN,  cx+gap-szSide/2, cy-szSide/2, szSide, szSide);
    y += ROW_CTRL;

    // volume bar
    var volY = y + ROW_VOL*0.45;
    var volIconSz = Math.round(18*u);
    var volBx = bx + volIconSz + Math.round(6*u);
    var volBw = bw - (volIconSz+Math.round(6*u))*2;
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.roundRect(volBx,volY,volBw,th,th/2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath(); ctx.roundRect(volBx,volY,volBw*0.75,th,th/2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(volBx+volBw*0.75, volY+th/2, Math.round(5.5*u),0,Math.PI*2); ctx.fill();
    // vol icons
    ctx.drawImage(icoVL, bx,                    volY+th/2-volIconSz/2, volIconSz, volIconSz);
    ctx.drawImage(icoVH, bx+bw-volIconSz, volY+th/2-volIconSz/2, volIconSz, volIconSz);

    var cl = roundClip(c, BR);
    return wrapOutput(addShadow(cl, Math.round(8*u), Math.round(32*u), 0.32));
  });
}

// ── canvas helpers ────────────────────────────────
function rrPath(ctx,x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function roundClip(src, r) {
  var c = document.createElement('canvas'); c.width=src.width; c.height=src.height;
  var ctx = c.getContext('2d');
  rrPath(ctx,0,0,src.width,src.height,r); ctx.clip();
  ctx.drawImage(src,0,0);
  return c;
}

function addShadow(src, offsetY, blur, alpha) {
  var pad = blur*2;
  var c = document.createElement('canvas');
  c.width = src.width+pad*2; c.height = src.height+pad*2+offsetY;
  var ctx = c.getContext('2d');
  ctx.shadowColor = 'rgba(0,0,0,'+alpha+')';
  ctx.shadowBlur = blur; ctx.shadowOffsetY = offsetY;
  ctx.drawImage(src, pad, pad);
  return c;
}

// ── download ─────────────────────────────────────
function doDownload() {
  if (!cropped) return;
  buildFrame().then(function(out) {
    var a = document.createElement('a');
    a.href = out.toDataURL('image/png');
    a.download = 'iframe-'+effect+'-'+saveRatio+'-'+Date.now()+'.png';
    a.click();
  });
}
</script>
